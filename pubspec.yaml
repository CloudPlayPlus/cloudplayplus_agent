name: cloudplayplus_agent
description: >-
  MCP channel bridge for Claude Code. Exposes a local Streamable HTTP MCP server
  with claude/channel + claude/channel/permission capabilities, letting host
  apps (e.g. CloudPlayPlus) route user messages, replies, and permission
  prompts between Claude Code and any transport layer.
version: 0.0.1
repository: https://github.com/CloudPlayPlus/cloudplayplus_agent
issue_tracker: https://github.com/CloudPlayPlus/cloudplayplus_agent/issues

environment:
  sdk: ^3.10.0
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter
  # CloudPlayPlus fork of mcp_dart with two fixes the upstream 2.1.0 release
  # lacks: configurable HttpServer.idleTimeout (default null, so long-lived
  # SSE streams don't get culled at 120s) and a transport.onclose callback
  # that fires when the standalone SSE GET disconnects.
  mcp_dart:
    git:
      url: https://github.com/CloudPlayPlus/mcp_dart.git
      ref: a1f48e2c06cabf85ab821459269a92432ae63b3c

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

# Declaring an (empty) `flutter:` section is what makes IDEs recognize this
# as a Flutter package rather than a plain Dart package — even though the
# library itself uses no Flutter APIs. Consumers can be any Flutter app.
flutter:
